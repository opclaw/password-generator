<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="900" cy="150" r="80" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Icon background circle -->
  <circle cx="600" cy="200" r="70" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Lock Icon (🔐) -->
  <g transform="translate(560, 160)" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Lock body -->
    <rect x="8" y="20" width="64" height="56" rx="8" fill="rgba(255,255,255,0.2)"/>
    <!-- Lock shackle -->
    <path d="M20 20V12a20 20 0 0 1 40 0v8"/>
    <!-- Keyhole -->
    <circle cx="40" cy="42" r="6" fill="white" stroke="none"/>
    <path d="M40 48v12" stroke-width="4"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="340" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    Password Generator
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="400" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    Secure Random Passwords
  </text>
  
  <!-- Brand -->
  <text x="600" y="540" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    SmartOK Tools
  </text>
  
  <!-- Decorative line -->
  <line x1="520" y1="560" x2="680" y2="560" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>